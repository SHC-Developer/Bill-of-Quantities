<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 데이터 블록 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>랜덤 데이터 블록 생성기</h1>
            <p class="subtitle">
                평균 범위와 데이터 값을 직접 지정하고, 조건을 만족하는 5x4 블록을 Excel로 추출하세요.
            </p>
        </header>

        <div class="generator-layout">
            <section class="generator-panel">
                <h3>생성 조건 입력</h3>
                <form id="randomGeneratorForm" class="generator-form">
                    <div class="form-group">
                        <label for="blockCount">블록 수 (1~100)</label>
                        <input type="number" id="blockCount" value="30" min="1" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="rowsPerBlock">행 수</label>
                        <input type="number" id="rowsPerBlock" value="4" min="1" max="10" readonly>
                    </div>
                    <div class="form-group">
                        <label for="colsPerBlock">열 수</label>
                        <input type="number" id="colsPerBlock" value="5" min="1" max="10" readonly>
                    </div>
                    <div class="form-group">
                        <label>평균값 범위</label>
                        <div style="display:flex; gap:10px;">
                            <input type="number" id="avgMin" value="44" step="0.1" placeholder="최소 값">
                            <input type="number" id="avgMax" value="51" step="0.1" placeholder="최대 값">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>데이터 값 범위</label>
                        <div style="display:flex; gap:10px;">
                            <input type="number" id="valueMin" value="40" step="0.1" placeholder="최소 값">
                            <input type="number" id="valueMax" value="65" step="0.1" placeholder="최대 값">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="maxAttempt">블록당 최대 시도 횟수</label>
                        <input type="number" id="maxAttempt" value="10000" min="1" max="50000">
                    </div>
                </form>
                <div id="statusMessage" class="status-message" style="display:none;"></div>
                <div class="generator-actions">
                    <button type="button" class="btn-primary" id="generateBtn">랜덤 데이터 생성</button>
                    <button type="button" class="btn-secondary" id="downloadExcelBtn" disabled>Excel로 추출</button>
                </div>
                <p class="settings-hint">
                    VBA 매크로와 동일한 로직으로 5x4 랜덤 값을 생성하고, 평균 조건을 만족하는지 검사합니다.
                </p>
            </section>

            <section class="preview-section">
                <div class="result-header" style="padding:0;">
                    <h3>생성 미리보기</h3>
                </div>
                <p id="previewHint" class="settings-hint">아직 생성된 데이터가 없습니다. 조건을 입력 후 "랜덤 데이터 생성" 버튼을 눌러주세요.</p>
                <div id="blockPreview" class="block-preview-grid"></div>
            </section>
        </div>

        <div class="nav-link">
            <a href="index.html" class="btn-primary">메인 페이지로 돌아가기</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="random-blocks.js"></script>
</body>
</html>
